<form [formGroup]="contactForm" (ngSubmit)="onSubmit()">
  <div class="mb-4">
    <!-- <label for="fullMessage" class="form-label text-light">Üzenet: </label> -->
    <textarea formControlName="message" class="form-control bg-dark text-white custom-textarea long-text"
      id="fullMessage" rows="10">
    </textarea>
  </div>

  <div class="mb-4">
    <input formControlName="name" type="text" class="form-control bg-dark text-white" placeholder="Szabó János">
  </div>

  <div class="mb-4">
    <input formControlName="email" type="email" class="form-control bg-dark text-white" placeholder="szabo.janos@gmail.com">
  </div>

  <div class="mb-4">
    <input formControlName="phone" type="tel" class="form-control bg-dark text-white" placeholder="+36/20 123 4567">
  </div>

  <div class="d-grid">
    <button type="submit" [disabled]="contactForm.invalid" class="btn btn-cta primary btn-lg fw-bold">
      Árajánlat kérése
    </button>
  </div>
</form>
