<section id="referenciak" class="py-5">
  <div class="container">
    <h2 class="section-title text-start mb-2">Referenciák</h2>

    <div class="row g-4">
      <div class="col-lg-6">
        <div class="gallery-container h-100">
          <div class="gallery-header">
            <!-- <i class="bi bi-images"></i> -->
            <h3>Dolgozunk...</h3>
            <p>Betekintés mindennapi precíz tisztítási folyamatainkba.</p>
          </div>

          <app-gallery [images]="generalImages" mode="thumbnails">
          </app-gallery>
        </div>
      </div>

      <div class="col-lg-6">
        <div class="gallery-container h-100 highlight-border">
          <div class="gallery-header">
            <!-- <i class="bi bi-arrow-left-right"></i> -->
            <h3>Előtte - Utána</h3>
            <p>Látványos különbségek: nézze meg az eredményt saját szemével.</p>
          </div>

          <app-gallery [images]="beforeAfterImages" mode="thumbnails" class="before-after-mode">
          </app-gallery>
        </div>
      </div>
    </div>
  </div>
</section>
