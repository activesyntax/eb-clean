<section class="hero" id="bemutatkozas">
  <div class="container text-center">
    <div class="hero-image-wrapper">
      <div class="before-after-box">
        <img src="/assets/img/solar-before-after.jpg" alt="Napelemek tisztítás előtt és után">
      </div>

      <div class="logo-box">
        <img src="{{ branding.logo.src }}" alt="{{ branding.logo.alt }}">
      </div>
    </div>

    <div>
      <h3 class="mt-4 glass-effect" [innerHTML]="branding.site.sloganHtml"></h3>
    </div>

    <p class="my-4 glass-effect d-inline-block">
      {{ branding.site.description }}
    </p>


    <div class="mt-3">
      <a href="#services" class="btn-cta primary">Ingyenes árajánlat</a>
      <a href="#references" class="btn-cta secondary">Referenciák</a>
    </div>
  </div>
</section>
