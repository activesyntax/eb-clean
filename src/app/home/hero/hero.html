<!-- HERO -->
<section class="hero" id="hero">
  <div class="container">

    <div class="logo-box">
      <img src="{{ branding.logo.src }}" alt="{{ branding.logo.alt }}" class="">
    </div>

    <div class="before-after-box">
      <img src="/assets/img/solar-before-after.png" alt="Napelemek tisztítás előtt és után" class="">
    </div>

    <div>
      <h3 class="mt-4 glass-effect" [innerHTML]="branding.site.sloganHtml"></h3>
    </div>

    <p class="mt-4 glass-effect">
      {{ branding.site.description }}
    </p>

    <a href="#services" class="btn btn-primary  btn-lg mt-4 me-4">Ingyenes árajánlat</a>
    <a href="#references" class="btn btn-secondary btn-lg mt-4">Referenciák</a>
  </div>
</section>
